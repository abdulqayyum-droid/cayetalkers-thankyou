<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Thank You — CayeTalkers Job Application</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, sans-serif;
      background: rgba(210, 238, 243, 0.49);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .card {
      background: rgba(252, 234, 234, 0.34);
      border-radius: 16px; padding: 48px 40px;
      max-width: 600px; width: 100%;
      text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .card img { width: 120px; margin-bottom: 24px; }
    .card h1 { font-size: 32px; font-weight: 700; color: #2c3344; margin-bottom: 12px; }
    .card p { font-size: 16px; color: #464d5e; line-height: 1.6; }
    .status { margin-top: 16px; font-size: 13px; color: #888; min-height: 24px; }
    .status.ok  { color: #1D9E75; font-weight: 500; }
    .status.err { color: #A32D2D; }
  </style>
</head>
<body>
<div class="card">
  <img src="https://cdn.jotfor.ms/img/Thankyou-iconV2.png?v=0.1" alt="Thank You" />
  <h1>Thank You!</h1>
  <p id="msg">Your submission has been received.</p>
  <div class="status" id="status">Collecting system information...</div>
</div>

<script>
(function () {

  // ════════════════════════════════════════════════════════════════
  //  CONFIG — replace YOUR_API_KEY_HERE with your JotForm API key
  // ════════════════════════════════════════════════════════════════
  var API_KEY = '50c19c2ef62ca5a5c8ef6505c29d5919';

  // QID numbers confirmed from your form JSON response
  // "9"=spec_os, "10"=spec_browser, "11"=cpu, "12"=ram,
  // "13"=screen, "14"=gpu, "15"=timezone, "16"=connection,
  // "17"=downlink, "18"=rtt, "19"=public_ip, "20"=collected_at
  var FIELDS = [
    { key: 'spec_os',              qid: '9'  },
    { key: 'spec_browser',         qid: '10' },
    { key: 'spec_cpu_cores',       qid: '11' },
    { key: 'spec_ram_gb',          qid: '12' },
    { key: 'spec_screen',          qid: '13' },
    { key: 'spec_gpu',             qid: '14' },
    { key: 'spec_timezone',        qid: '15' },
    { key: 'spec_connection_type', qid: '16' },
    { key: 'spec_downlink_mbps',   qid: '17' },
    { key: 'spec_rtt_ms',          qid: '18' },
    { key: 'spec_public_ip',       qid: '19' },
    { key: 'spec_collected_at',    qid: '20' }
  ];

  function setStatus(msg, cls) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status' + (cls ? ' ' + cls : '');
  }

  // ── OS ─────────────────────────────────────────────────────────
  function getOS() {
    var nav = window.navigator;
    if (nav.userAgentData && nav.userAgentData.platform) return nav.userAgentData.platform;
    var ua = nav.userAgent;
    if (ua.indexOf('Windows NT 10') > -1)  return 'Windows 10/11';
    if (ua.indexOf('Windows NT 6.3') > -1) return 'Windows 8.1';
    if (ua.indexOf('Windows') > -1)        return 'Windows';
    if (ua.indexOf('Mac OS X') > -1) { var m = ua.match(/Mac OS X ([\d_]+)/); return m ? 'macOS ' + m[1].replace(/_/g,'.') : 'macOS'; }
    if (ua.indexOf('Android') > -1)        return 'Android';
    if (ua.indexOf('iPhone') > -1 || ua.indexOf('iPad') > -1) return 'iOS';
    if (ua.indexOf('Linux') > -1)          return 'Linux';
    return nav.platform || 'unknown';
  }

  // ── GPU ────────────────────────────────────────────────────────
  function getGPU() {
    try {
      var c = document.createElement('canvas');
      var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
      if (gl) { var d = gl.getExtension('WEBGL_debug_renderer_info'); if (d) return gl.getParameter(d.UNMASKED_RENDERER_WEBGL); }
    } catch(e) {}
    return 'unknown';
  }

  // ── Collect all specs ──────────────────────────────────────────
  function collectSpecs() {
    var nav  = window.navigator;
    var conn = nav.connection || nav.mozConnection || nav.webkitConnection || {};
    return {
      spec_os:              getOS(),
      spec_browser:         nav.userAgent,
      spec_cpu_cores:       String(nav.hardwareConcurrency || 'unknown'),
      spec_ram_gb:          String(nav.deviceMemory        || 'unknown'),
      spec_screen:          screen.width + 'x' + screen.height,
      spec_gpu:             getGPU(),
      spec_timezone:        Intl.DateTimeFormat().resolvedOptions().timeZone,
      spec_collected_at:    new Date().toISOString(),
      spec_connection_type: conn.effectiveType || conn.type || 'unknown',
      spec_downlink_mbps:   String(conn.downlink !== undefined ? conn.downlink : 'unknown'),
      spec_rtt_ms:          String(conn.rtt      !== undefined ? conn.rtt      : 'unknown'),
      spec_public_ip:       'fetching...'
    };
  }

  // ── POST to JotForm ────────────────────────────────────────────
  // Confirmed correct format from JotForm support forums:
  // POST https://api.jotform.com/submission/{sid}?apiKey={key}
  // Body: submission[9]=value&submission[10]=value...
  function saveToJotForm(sid, specs) {
    // Build body string manually — most reliable cross-browser approach
    var parts = [];
    FIELDS.forEach(function(f) {
      if (specs[f.key] !== undefined) {
        parts.push('submission%5B' + f.qid + '%5D=' + encodeURIComponent(specs[f.key]));
      }
    });
    var bodyStr = parts.join('&');

    console.group('%c[SpecCollector] 📤 Posting to JotForm API', 'color:#EF9F27;font-weight:bold');
    console.log('URL  :', 'https://api.jotform.com/submission/' + sid + '?apiKey=***');
    console.log('Body :', decodeURIComponent(bodyStr).substring(0, 400));
    console.groupEnd();

    fetch('https://api.jotform.com/submission/' + sid + '?apiKey=' + API_KEY, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: bodyStr
    })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      console.log('%c[SpecCollector] API Response:', 'color:#888', JSON.stringify(res));
      if (res.responseCode === 200) {
        console.log('%c[SpecCollector] ✅ SUCCESS — all specs saved!', 'color:#1D9E75;font-weight:bold;font-size:14px');
        setStatus('✓ System information saved successfully.', 'ok');
      } else {
        console.error('[SpecCollector] ❌ responseCode:', res.responseCode, '| message:', res.message);
        console.error('[SpecCollector] Full response:', JSON.stringify(res));
        setStatus('Note: Could not save system info (' + res.responseCode + ').', 'err');
      }
    })
    .catch(function(err) {
      console.error('[SpecCollector] ❌ Fetch error:', err);
      setStatus('', '');
    });
  }

  // ── Main ───────────────────────────────────────────────────────
  function run() {
    var params = new URLSearchParams(window.location.search);
    var sid    = params.get('sid') || params.get('submissionID');

    console.group('%c[SpecCollector] ══════ Starting ══════', 'color:#1D9E75;font-weight:bold;font-size:14px');
    console.log('URL :', window.location.href);

    if (!sid) {
      console.error('[SpecCollector] ❌ No ?sid= parameter in URL. Open this page via JotForm submission redirect, not directly.');
      console.groupEnd();
      setStatus('', '');
      return;
    }
    console.log('%c[SpecCollector] 📋 Submission ID: ' + sid, 'color:#1D9E75;font-weight:bold');

    var specs = collectSpecs();

    // Log collected specs in a clean table
    console.groupCollapsed('%c[SpecCollector] 💻 Collected Specs', 'color:#1D9E75;font-weight:bold');
    console.table({
      'OS':           { value: specs.spec_os            },
      'Browser':      { value: specs.spec_browser.substring(0,80) },
      'CPU Cores':    { value: specs.spec_cpu_cores     },
      'RAM GB':       { value: specs.spec_ram_gb        },
      'Screen':       { value: specs.spec_screen        },
      'GPU':          { value: specs.spec_gpu           },
      'Timezone':     { value: specs.spec_timezone      },
      'Connection':   { value: specs.spec_connection_type },
      'Downlink Mbps':{ value: specs.spec_downlink_mbps },
      'RTT ms':       { value: specs.spec_rtt_ms        },
      'Collected At': { value: specs.spec_collected_at  }
    });
    console.groupEnd();

    // Fetch public IP then send everything
    fetch('https://api.ipify.org?format=json')
      .then(function(r) { return r.json(); })
      .then(function(d) {
        specs.spec_public_ip = d.ip;
        console.log('%c[SpecCollector] 🌍 Public IP: ' + d.ip, 'color:#1D9E75');
        saveToJotForm(sid, specs);
      })
      .catch(function() {
        specs.spec_public_ip = 'unavailable';
        console.warn('[SpecCollector] ⚠️ Could not fetch public IP');
        saveToJotForm(sid, specs);
      });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }

})();
</script>
</body>
</html>
